<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mama-Bot — Maternal Health Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f2fbf7; 
         display: flex; flex-direction: column; height: 100vh; }

  .header { background: #0F6E56; padding: 14px 20px; 
             display: flex; align-items: center; gap: 10px; }
  .header-dot { width: 10px; height: 10px; border-radius: 50%; 
                background: #9FE1CB; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .header h1 { color: white; font-size: 18px; font-weight: 700; }
  .header p  { color: #9FE1CB; font-size: 11px; margin-top: 1px; }

  .chat-box { flex: 1; padding: 16px; overflow-y: auto; 
               display: flex; flex-direction: column; gap: 10px; }

  .msg { max-width: 78%; padding: 10px 14px; 
         border-radius: 4px 16px 16px 16px; 
         font-size: 14px; line-height: 1.55; }
  .msg.bot  { background: white; color: #1A1A2E; 
               border: 0.5px solid #D3D1C7; align-self: flex-start; }
  .msg.user { background: #0F6E56; color: white; 
               border-radius: 16px 4px 16px 16px; align-self: flex-end; }
  .msg.danger { background: #FCEBEB; border: 2px solid #E24B4A; 
                color: #791F1F; align-self: flex-start; 
                border-radius: 4px 16px 16px 16px; }

  .danger-head { font-weight: 700; color: #A32D2D; 
                  margin-bottom: 6px; font-size: 13px; }

  .input-row { padding: 12px 16px; background: white; 
               border-top: 0.5px solid #D3D1C7;
               display: flex; gap: 10px; align-items: center; }
  .input-row input { flex: 1; padding: 10px 16px; border-radius: 24px;
                     border: 1px solid #D3D1C7; font-size: 14px;
                     background: #f2fbf7; outline: none; }
  .input-row input:focus { border-color: #0F6E56; }
  .send-btn { width: 42px; height: 42px; border-radius: 50%; 
              background: #0F6E56; border: none; cursor: pointer;
              display: flex; align-items: center; justify-content: center;
              box-shadow: 0 3px 10px rgba(15,110,86,.3); }
  .send-btn:hover { background: #1D9E75; }
  .arrow { width: 0; height: 0; border-top: 6px solid transparent;
           border-bottom: 6px solid transparent; 
           border-left: 10px solid white; margin-left: 3px; }

  .typing { display: flex; gap: 4px; padding: 12px 16px;
            background: white; border-radius: 4px 16px 16px 16px;
            border: 0.5px solid #D3D1C7; align-self: flex-start; width: 56px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; 
          background: #5DCAA5; animation: tda .9s infinite; }
  .dot:nth-child(2){animation-delay:.15s}
  .dot:nth-child(3){animation-delay:.3s}
  @keyframes tda{0%,80%,100%{transform:scale(1);opacity:.4}
                 40%{transform:scale(1.3);opacity:1}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-dot"></div>
  </div>
  <div>
    <h1>Mama-Bot</h1>
    <p>Maternal Health Assistant · Online</p>
  </div>
</div>

<div class="chat-box" id="chatBox">
  <div class="msg bot">
    Hello! I am Mama-Bot, your maternal health assistant. 
    I am here to help you with questions about pregnancy and 
    postnatal care. How are you feeling today?
  </div>
</div>

<div class="input-row">
  <input type="text" id="userInput" 
         placeholder="Ask me anything about your health…"
         onkeydown="if(event.key==='Enter') sendMessage()"/>
  <button class="send-btn" onclick="sendMessage()">
    <div class="arrow"></div>
  </button>
</div>

<script>
  // Change this to your deployed backend URL when you deploy
  const API_URL = 'http://localhost:5000/chat';

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const chatBox = document.getElementById('chatBox');
    const text = input.value.trim();
    if (!text) return;

    // Show user message
    chatBox.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;

    // Show typing indicator
    chatBox.innerHTML += `
      <div class="typing" id="typing">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();

      document.getElementById('typing').remove();

      if (data.is_danger) {
        chatBox.innerHTML += `
          <div class="msg danger">
            <div class="danger-head">⚠ Danger Sign Detected</div>
            ${data.reply}
          </div>`;
      } else {
        chatBox.innerHTML += `<div class="msg bot">${data.reply}</div>`;
      }

    } catch (err) {
      document.getElementById('typing').remove();
      chatBox.innerHTML += `
        <div class="msg bot">
          Sorry, I could not connect to the server. 
          Please check your connection and try again.
        </div>`;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
</body>
</html>
